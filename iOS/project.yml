name: Sunsoak
options:
  bundleIdPrefix: com.shimondeitel.sunlightlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Sunsoak:
    type: application
    platform: iOS
    sources:
      - path: Sunsoak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sunlightlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Sunsoak/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SunsoakTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SunsoakTests
      - path: Sunsoak.storekit
    dependencies:
      - target: Sunsoak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sunlightlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SunsoakUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SunsoakUITests
    dependencies:
      - target: Sunsoak
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sunlightlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Sunsoak:
    build:
      targets:
        Sunsoak: all
        SunsoakTests: [test]
        SunsoakUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Sunsoak.storekit
    test:
      config: Debug
      storeKitConfiguration: Sunsoak.storekit
      targets:
        - SunsoakTests
        - SunsoakUITests
    archive:
      config: Release
